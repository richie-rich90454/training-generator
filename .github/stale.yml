# Configuration for actions/stale.
# https://github.com/actions/stale

# Number of days of inactivity before an issue or PR becomes stale.
daysUntilStale: 60

# Number of days of inactivity after being stale before it is closed.
daysUntilClose: 14

# Label to apply when an issue or PR becomes stale.
staleLabel: stale

# Issues and PRs with any of these labels are never marked stale or closed.
exemptLabels:
  - pinned
  - security
  - good first issue
  - help wanted

# Limit the number of actions per run to avoid hitting rate limits.
operationsPerRun: 30

# Comment to post when marking an issue or PR as stale.
markComment: >
  This issue has been automatically marked as stale because it has not had
  recent activity in the last 60 days. It will be closed in 14 days if no
  further activity occurs. To keep it open, leave a comment or remove the
  `stale` label. Thank you for your contributions!

# Comment to post when closing a stale issue or PR.
closeComment: >
  This issue has been automatically closed because it has not had recent
  activity. If the issue is still relevant, please reopen it or open a new
  one with up-to-date details. Thank you!
