name: "Dependency Review"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the check on moderate or higher severity vulnerabilities.
          fail-on-severity: moderate
          # Post a summary comment on the pull request.
          comment-summary-in-pr: true
          # Fail on OpenSSF scorecard levels below 5 (when available).
          fail-on-openssf-scorecard-level: 5
