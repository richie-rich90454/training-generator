name: "Labeler"

# Auto-labels pull requests based on the path globs defined in
# .github/labeler.yml using actions/labeler v5.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  label:
    name: Label pull request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          # Sync labels: remove labels that no longer match the changed files.
          sync-labels: true
