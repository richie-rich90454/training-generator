name: "Release Drafter"

# Drafts the next release notes on every push to main, categorizing merged
# pull requests according to .github/release-drafter.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update_release_draft:
    name: Draft next release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Draft release
        uses: release-drafter/release-drafter@v6
        with:
          config-name: .github/release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
