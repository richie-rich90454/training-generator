name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-mac:
    runs-on: macos-latest
    if: ${{ !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: mkdir -p release
      - run: npm run package:mac -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: ls -lah release/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  package-linux:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update
      - run: sudo apt-get install -y libfuse2 rpm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: mkdir -p release
      - run: npm run package:linux -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: ls -lah release/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest-linux.yml

  package-windows:
    runs-on: windows-latest
    if: ${{ !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: mkdir release
      - run: npm run package:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - run: dir release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap