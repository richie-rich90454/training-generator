name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  package-mac:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 30
    if: ${{ !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: mkdir -p release

      - name: Package macOS
        run: npm run package:mac -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - run: ls -lah release/

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  package-linux:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - run: npm ci
      - run: npm run build
      - run: mkdir -p release

      - name: Package Linux
        run: npm run package:linux -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - run: ls -lah release/

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest-linux.yml

  package-windows:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 30
    if: ${{ !contains(github.event.release.tag_name, '-alpha') && !contains(github.event.release.tag_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: mkdir release

      - name: Package Windows
        run: npm run package:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - run: dir release

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml