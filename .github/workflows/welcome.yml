name: "Welcome"

# Greets first-time contributors when they open their first issue or pull
# request. Uses actions/first-interaction@v1. Message text mirrors the
# welcome config in .github/welcome.yml.

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: welcome-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Greet first-time contributor
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue in Training Generator!

            Please make sure you've included enough detail for us to reproduce
            or understand the problem. While you wait, feel free to check the
            [documentation](https://github.com/richie-rich90454/training-generator/tree/main/docs)
            and the
            [troubleshooting guide](https://github.com/richie-rich90454/training-generator/blob/main/docs/troubleshooting/common-issues.md).
            A maintainer will take a look soon. Thanks for helping improve the
            project.
          pr-message: |
            Thanks for opening your first pull request in Training Generator!

            A maintainer will review your changes shortly. In the meantime,
            please make sure you've read
            [CONTRIBUTING.md](https://github.com/richie-rich90454/training-generator/blob/main/CONTRIBUTING.md)
            and that `npm run typecheck` and `npm test` pass locally. We really
            appreciate your contribution!
