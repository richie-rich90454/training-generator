<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Training Generator brand mark">
    <!--
        Concept: a training graph inside a rounded app-icon tile.

        Visual language:
            * The rounded square uses the project primary-to-secondary gradient,
              signalling an AI-powered, modern application.
            * The white network inside is a small decision-tree / neural graph:
              one input node flows through a hidden node and branches to two
              output nodes. It reads as "training data" rather than a generic
              document or file icon.
            * The mark stays simple and bold so it remains legible from a 16px
              favicon up to a 1024px installer hero.
    -->
    <defs>
        <linearGradient id="appIconGradient" x1="0" y1="0" x2="24" y2="24">
            <stop offset="0%" stop-color="#1A73E8"/>
            <stop offset="100%" stop-color="#34A853"/>
        </linearGradient>
    </defs>
    <rect x="2" y="2" width="20" height="20" rx="4" fill="url(#appIconGradient)"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="7" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="8" y2="17"/>
        <line x1="12" y1="12" x2="16" y2="17"/>
    </g>
    <circle cx="12" cy="7" r="2" fill="#FFFFFF"/>
    <circle cx="12" cy="12" r="2" fill="#FFFFFF"/>
    <circle cx="8" cy="17" r="2" fill="#FFFFFF"/>
    <circle cx="16" cy="17" r="2" fill="#FFFFFF"/>
</svg>